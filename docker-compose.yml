version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - trained_models_data:/app/trained_models
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/facttrack.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  trained_models_data:
  sqlite_data:
